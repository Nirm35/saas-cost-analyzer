<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנתח עלויות SaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            padding: 16px;
            direction: rtl;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #004578;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            flex-wrap: wrap;
        }

        .tab-button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
        }

        .tab-button.active {
            color: #004578;
            border-bottom-color: #004578;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .button {
            padding: 10px 16px;
            background: #004578;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .button:hover {
            background: #003562;
        }

        .status-box {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-right: 4px solid #004578;
        }

        .status-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 4px;
            text-align: center;
        }

        .metric-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 600;
            color: #004578;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        thead {
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        th {
            padding: 12px;
            text-align: right;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .table-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
        }

        .table-item-delete {
            padding: 6px 12px;
            background: #ffebee;
            color: #c33;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .help-text {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .button-group button {
            flex: 1;
        }

        .button.secondary {
            background: #e0e0e0;
            color: #333;
        }

        .button.secondary:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 מנתח עלויות SaaS</h1>
            <p>ניתוח עלויות מוצרים לפי מחלקה</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(event, 'setup')">הגדרה</button>
            <button class="tab-button" onclick="switchTab(event, 'pricing')">עלויות</button>
            <button class="tab-button" onclick="switchTab(event, 'analyze')">ניתוח</button>
        </div>

        <!-- TAB 1: SETUP -->
        <div id="setup" class="tab-content active">
            <div class="status-box">
                <div class="status-label">טבלאות קבועות שמורות</div>
                <div class="status-value" id="setupStatus">אין טבלאות עדיין</div>
            </div>

            <div class="form-group">
                <label>שם הטבלה הקבועה (למשל: עובדים 2026)</label>
                <input type="text" id="tableName" placeholder="שם תיאורי לטבלה">
            </div>

            <div class="form-group">
                <label>העלה טבלה קבועה (email + dep)</label>
                <input type="file" id="baseFile" accept=".csv">
                <div class="help-text">CSV עם עמודות email ודep (אפשר עמודות נוספות)</div>
            </div>

            <button class="button" onclick="saveBaseFile()">✓ שמור טבלה קבועה</button>

            <div id="tablesList" style="margin-top: 20px;"></div>
        </div>

        <!-- TAB 2: PRICING -->
        <div id="pricing" class="tab-content">
            <div class="status-box">
                <div class="status-label">מוצרים שהוגדרו</div>
                <div class="status-value" id="pricingStatus">אין עלויות שהוגדרו עדיין</div>
            </div>

            <div class="form-group">
                <label>שם המוצר</label>
                <input type="text" id="productName" placeholder="למשל: Slack, Jira, Figma">
            </div>

            <div class="form-group">
                <label>עלות חודשית לכל משתמש (₪)</label>
                <input type="number" id="productCost" placeholder="למשל: 50" step="0.01" min="0">
            </div>

            <button class="button" onclick="addCost()">+ הוסף מוצר</button>

            <div id="costsList" style="margin-top: 20px;"></div>
        </div>

        <!-- TAB 3: ANALYZE -->
        <div id="analyze" class="tab-content">
            <div class="form-group">
                <label>בחר טבלה קבועה</label>
                <select id="tableSelect" style="width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 14px;">
                    <option value="">-- בחר טבלה --</option>
                </select>
            </div>

            <div class="form-group">
                <label>העלה קובץ לניתוח</label>
                <input type="file" id="analyzeFile" accept=".csv">
                <div class="help-text">CSV עם עמודות email ועמודה עם שם המוצר (אפשר עמודות נוספות)</div>
            </div>

            <button class="button" onclick="analyzeFile()">📊 חשב עלויות</button>

            <div id="results" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        var baseDataMap = {};
        var costingData = {};

        // Load from localStorage on page load
        function loadFromStorage() {
            var stored = localStorage.getItem('saascost_basedatamap');
            if (stored) {
                baseDataMap = JSON.parse(stored);
            }
            var storedCosts = localStorage.getItem('saascost_costingdata');
            if (storedCosts) {
                costingData = JSON.parse(storedCosts);
            }
            updateUI();
        }

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem('saascost_basedatamap', JSON.stringify(baseDataMap));
            localStorage.setItem('saascost_costingdata', JSON.stringify(costingData));
        }

        // Update UI
        function updateUI() {
            updateSetupStatus();
            updateTableSelect();
            updatePricingStatus();
        }

        function switchTab(event, tabName) {
            event.preventDefault();
            
            var tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
            });
            
            var buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function saveBaseFile() {
            var tableName = document.getElementById('tableName').value.trim();
            var fileInput = document.getElementById('baseFile');
            var file = fileInput.files[0];

            if (!tableName) {
                alert('הזן שם לטבלה');
                return;
            }

            if (!file) {
                alert('בחר קובץ CSV');
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var text = e.target.result;
                    var lines = text.trim().split('\n');

                    if (lines.length < 2) {
                        alert('הקובץ ריק או לא תקין');
                        return;
                    }

                    var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
                    var emailIndex = headers.findIndex(function(h) { return h === 'email'; });
                    var depIndex = headers.findIndex(function(h) { return h === 'dep'; });

                    if (emailIndex === -1 || depIndex === -1) {
                        alert('לא נמצאו עמודות email או dep בקובץ');
                        return;
                    }

                    var tableData = {};
                    var successCount = 0;
                    for (var i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                        if (parts.length > Math.max(emailIndex, depIndex) && parts[emailIndex]) {
                            tableData[parts[emailIndex].toLowerCase()] = parts[depIndex];
                            successCount++;
                        }
                    }

                    baseDataMap[tableName] = tableData;
                    saveToStorage();
                    updateUI();
                    
                    document.getElementById('tableName').value = '';
                    document.getElementById('baseFile').value = '';
                    alert('הטבלה "' + tableName + '" נשמרה בהצלחה!\nנטענו ' + successCount + ' משתמשים');
                } catch (error) {
                    alert('שגיאה בקריאת הקובץ: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        function updateSetupStatus() {
            var tables = Object.keys(baseDataMap);
            if (tables.length === 0) {
                document.getElementById('setupStatus').textContent = 'אין טבלאות עדיין';
                document.getElementById('tablesList').innerHTML = '';
            } else {
                document.getElementById('setupStatus').textContent = tables.length + ' טבלאות שמורות';
                var html = '';
                tables.forEach(function(table) {
                    var count = Object.keys(baseDataMap[table]).length;
                    html += '<div class="table-item"><div><strong>' + table + '</strong><br><span class="help-text">' + count + ' משתמשים</span></div><button class="table-item-delete" onclick="deleteTable(\'' + table.replace(/'/g, "\\'") + '\')">מחק</button></div>';
                });
                document.getElementById('tablesList').innerHTML = html;
            }
        }

        function updateTableSelect() {
            var select = document.getElementById('tableSelect');
            var tables = Object.keys(baseDataMap);
            select.innerHTML = '<option value="">-- בחר טבלה --</option>';
            tables.forEach(function(table) {
                var option = document.createElement('option');
                option.value = table;
                option.textContent = table;
                select.appendChild(option);
            });
        }

        function deleteTable(tableName) {
            if (confirm('האם אתה בטוח שברצונך למחוק את הטבלה "' + tableName + '"?')) {
                delete baseDataMap[tableName];
                saveToStorage();
                updateUI();
            }
        }

        function updatePricingStatus() {
            var products = Object.keys(costingData);
            if (products.length === 0) {
                document.getElementById('pricingStatus').textContent = 'אין עלויות שהוגדרו עדיין';
                document.getElementById('costsList').innerHTML = '';
            } else {
                document.getElementById('pricingStatus').textContent = products.length + ' מוצרים שהוגדרו';
                var html = '';
                products.forEach(function(product) {
                    html += '<div class="table-item"><div><strong>' + product + '</strong><br><span class="help-text">₪' + costingData[product].toFixed(2) + ' לכל משתמש</span></div><button class="table-item-delete" onclick="deleteCost(\'' + product.replace(/'/g, "\\'") + '\')">מחק</button></div>';
                });
                document.getElementById('costsList').innerHTML = html;
            }
        }

        function deleteCost(product) {
            delete costingData[product];
            saveToStorage();
            updatePricingStatus();
        }

        function addCost() {
            var productName = document.getElementById('productName').value.trim();
            var productCost = parseFloat(document.getElementById('productCost').value);

            if (!productName) {
                alert('הזן שם מוצר');
                return;
            }

            if (isNaN(productCost) || productCost < 0) {
                alert('הזן עלות תקינה');
                return;
            }

            costingData[productName] = productCost;
            saveToStorage();
            document.getElementById('productName').value = '';
            document.getElementById('productCost').value = '';
            updatePricingStatus();
            alert(productName + ' נוסף בהצלחה!');
        }

        function analyzeFile() {
            var selectedTable = document.getElementById('tableSelect').value;
            
            if (!selectedTable) {
                alert('בחר טבלה קבועה');
                return;
            }

            var baseData = baseDataMap[selectedTable];

            if (Object.keys(costingData).length === 0) {
                alert('קודם כל הגדר עלויות בתסמונת "עלויות"');
                return;
            }

            var fileInput = document.getElementById('analyzeFile');
            var file = fileInput.files[0];

            if (!file) {
                alert('בחר קובץ CSV');
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var text = e.target.result;
                    var lines = text.trim().split('\n');

                    if (lines.length < 2) {
                        alert('הקובץ ריק או לא תקין');
                        return;
                    }

                    var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
                    var emailIndex = headers.findIndex(function(h) { return h === 'email'; });
                    
                    if (emailIndex === -1) {
                        alert('לא נמצאה עמודת email בקובץ');
                        return;
                    }

                    var productIndex = -1;
                    for (var j = 0; j < headers.length; j++) {
                        var header = headers[j];
                        var isProduct = Object.keys(costingData).some(function(product) { 
                            return header.toLowerCase() === product.toLowerCase(); 
                        });
                        if (isProduct) {
                            productIndex = j;
                            break;
                        }
                    }

                    if (productIndex === -1) {
                        alert('לא נמצאה עמודה עם שם המוצר שהגדרת');
                        return;
                    }

                    var departments = {};
                    var unmatched = 0;
                    var processedCount = 0;

                    for (var i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                        if (parts.length > Math.max(emailIndex, productIndex) && parts[emailIndex]) {
                            var email = parts[emailIndex].toLowerCase();
                            var product = parts[productIndex];
                            var dept = baseData[email];
                            var cost = costingData[product];

                            if (dept && cost !== undefined) {
                                if (!departments[dept]) {
                                    departments[dept] = { users: 0, cost: 0 };
                                }
                                departments[dept].users += 1;
                                departments[dept].cost += cost;
                                processedCount++;
                            } else {
                                unmatched++;
                            }
                        }
                    }

                    if (processedCount === 0) {
                        alert('לא הצליח למצוא משתמשים תואמים או מוצרים תקינים');
                        return;
                    }

                    var sorted = Object.entries(departments).sort(function(a, b) { 
                        return b[1].cost - a[1].cost; 
                    });
                    var totalUsers = sorted.reduce(function(sum, item) { 
                        return sum + item[1].users; 
                    }, 0);
                    var totalMonthlyCost = sorted.reduce(function(sum, item) { 
                        return sum + item[1].cost; 
                    }, 0);

                    var html = '<div class="metrics"><div class="metric-card"><div class="metric-label">סה"כ משתמשים שהתאימו</div><div class="metric-value">' + totalUsers + '</div></div><div class="metric-card"><div class="metric-label">עלות חודשית כוללת</div><div class="metric-value">₪' + totalMonthlyCost.toFixed(2) + '</div></div></div>';

                    if (unmatched > 0) {
                        html += '<div style="background: #ffeaa7; padding: 12px; border-radius: 4px; margin-bottom: 16px; font-size: 14px;">⚠️ ' + unmatched + ' שורות לא תאמו (email לא נמצא בטבלה הקבועה או מוצר לא מוגדר)</div>';
                    }

                    html += '<table><thead><tr><th>מחלקה</th><th style="text-align: center;">משתמשים</th><th style="text-align: center;">אחוז</th><th style="text-align: center;">עלות חודשית</th></tr></thead><tbody>';

                    sorted.forEach(function(item) {
                        var dept = item[0];
                        var data = item[1];
                        var percentage = ((data.users / totalUsers) * 100).toFixed(1);
                        html += '<tr><td>' + dept + '</td><td style="text-align: center; font-weight: 600;">' + data.users + '</td><td style="text-align: center;">' + percentage + '%</td><td style="text-align: center; font-weight: 600;">₪' + data.cost.toFixed(2) + '</td></tr>';
                    });

                    html += '</tbody></table>';

                    document.getElementById('results').innerHTML = html;
                } catch (error) {
                    alert('שגיאה בניתוח הקובץ: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        // Load data on page load
        window.addEventListener('load', function() {
            loadFromStorage();
        });
    </script>
</body>
</html>
