<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנתח עלויות SaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            padding: 16px;
            direction: rtl;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #004578;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            flex-wrap: wrap;
        }

        .tab-button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
        }

        .tab-button.active {
            color: #004578;
            border-bottom-color: #004578;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .button {
            padding: 10px 16px;
            background: #004578;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .button:hover {
            background: #003562;
        }

        .status-box {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-right: 4px solid #004578;
        }

        .status-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 4px;
            text-align: center;
        }

        .metric-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 600;
            color: #004578;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        thead {
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        th {
            padding: 12px;
            text-align: right;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .table-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
        }

        .table-item-delete {
            padding: 6px 12px;
            background: #ffebee;
            color: #c33;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
        }

        .history-item-info {
            flex: 1;
        }

        .history-item-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .history-item-date {
            font-size: 12px;
            color: #999;
        }

        .history-item-buttons {
            display: flex;
            gap: 8px;
        }

        .history-item-buttons button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .help-text {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .save-history-section {
            background: #e3f2fd;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-right: 4px solid #004578;
        }

        .save-history-section input {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 מנתח עלויות SaaS</h1>
            <p>ניתוח עלויות מוצרים לפי מחלקה</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(event, 'setup')">הגדרה</button>
            <button class="tab-button" onclick="switchTab(event, 'pricing')">עלויות</button>
            <button class="tab-button" onclick="switchTab(event, 'analyze')">ניתוח</button>
            <button class="tab-button" onclick="switchTab(event, 'history')">📋 היסטוריה</button>
        </div>

        <!-- TAB 1: SETUP -->
        <div id="setup" class="tab-content active">
            <div class="status-box">
                <div class="status-label">טבלאות קבועות שמורות</div>
                <div class="status-value" id="setupStatus">אין טבלאות עדיין</div>
            </div>

            <div class="form-group">
                <label>שם הטבלה הקבועה (למשל: עובדים 2026)</label>
                <input type="text" id="tableName" placeholder="שם תיאורי לטבלה">
            </div>

            <div class="form-group">
                <label>העלה טבלה קבועה (email + dep)</label>
                <input type="file" id="baseFile" accept=".csv">
                <div class="help-text">CSV עם עמודות email ודep (אפשר עמודות נוספות)</div>
            </div>

            <button class="button" onclick="saveBaseFile()">✓ שמור טבלה קבועה</button>

            <div id="tablesList" style="margin-top: 20px;"></div>
        </div>

        <!-- TAB 2: PRICING -->
        <div id="pricing" class="tab-content">
            <div class="status-box">
                <div class="status-label">מוצרים שהוגדרו</div>
                <div class="status-value" id="pricingStatus">אין עלויות שהוגדרו עדיין</div>
            </div>

            <div class="form-group">
                <label>שם המוצר</label>
                <input type="text" id="productName" placeholder="למשל: Slack, Jira, Figma">
            </div>

            <div class="form-group">
                <label>עלות חודשית לכל משתמש (₪)</label>
                <input type="number" id="productCost" placeholder="למשל: 50" step="0.01" min="0">
            </div>

            <button class="button" onclick="addCost()">+ הוסף מוצר</button>

            <div id="costsList" style="margin-top: 20px;"></div>
        </div>

        <!-- TAB 3: ANALYZE -->
        <div id="analyze" class="tab-content">
            <div class="form-group">
                <label>העלה קובץ לניתוח</label>
                <input type="file" id="analyzeFile" accept=".csv">
                <div class="help-text">CSV עם עמודות email ועמודה עם שם המוצר (אפשר עמודות נוספות)</div>
            </div>

            <button class="button" onclick="analyzeFile()">📊 חשב עלויות</button>

            <div id="analysisResults" style="display: none;">
                <div class="save-history-section">
                    <label>שמור ניתוח זה להיסטוריה:</label>
                    <input type="text" id="saveName" placeholder="תן שם לניתוח זה (למשל: Lucid - דצמבר 2024)">
                    <button class="button" onclick="saveToHistory()">💾 שמור לניסטוריה</button>
                </div>
            </div>

            <div id="results" style="margin-top: 20px;"></div>
        </div>

        <!-- TAB 4: HISTORY -->
        <div id="history" class="tab-content">
            <div class="status-box">
                <div class="status-label">ניתוחים שמורים</div>
                <div class="status-value" id="historyStatus">אין ניתוחים שמורים עדיין</div>
            </div>

            <div id="historyList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        var baseDataMap = {};
        var costingData = {};
        var lastAnalysisData = null;
        var analysisHistory = {};

        function loadFromStorage() {
            try {
                var stored = localStorage.getItem('saascost_basedatamap');
                if (stored) {
                    baseDataMap = JSON.parse(stored);
                }
                var storedCosts = localStorage.getItem('saascost_costingdata');
                if (storedCosts) {
                    costingData = JSON.parse(storedCosts);
                }
                var storedHistory = localStorage.getItem('saascost_history');
                if (storedHistory) {
                    analysisHistory = JSON.parse(storedHistory);
                }
            } catch(e) {
                console.error('שגיאה בטעינה:', e);
                baseDataMap = {};
                costingData = {};
                analysisHistory = {};
            }
            updateUI();
        }

        function saveToStorage() {
            try {
                localStorage.setItem('saascost_basedatamap', JSON.stringify(baseDataMap));
                localStorage.setItem('saascost_costingdata', JSON.stringify(costingData));
                localStorage.setItem('saascost_history', JSON.stringify(analysisHistory));
            } catch(e) {
                console.error('שגיאה בשמירה:', e);
            }
        }

        function updateUI() {
            updateSetupStatus();
            updatePricingStatus();
            updateHistoryStatus();
        }

        function switchTab(event, tabName) {
            event.preventDefault();
            
            var tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(function(tab) {
                tab.classList.remove('active');
            });
            
            var buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function saveBaseFile() {
            var tableName = document.getElementById('tableName').value.trim();
            var fileInput = document.getElementById('baseFile');
            var file = fileInput.files[0];

            if (!tableName) {
                alert('הזן שם לטבלה');
                return;
            }

            if (!file) {
                alert('בחר קובץ CSV');
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var text = e.target.result;
                    var lines = text.trim().split('\n');

                    if (lines.length < 2) {
                        alert('הקובץ ריק או לא תקין');
                        return;
                    }

                    var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
                    var emailIndex = headers.findIndex(function(h) { return h === 'email'; });
                    var depIndex = headers.findIndex(function(h) { return h === 'dep'; });

                    if (emailIndex === -1 || depIndex === -1) {
                        alert('לא נמצאו עמודות email או dep בקובץ');
                        return;
                    }

                    var tableData = {};
                    var successCount = 0;
                    for (var i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                        if (parts.length > Math.max(emailIndex, depIndex) && parts[emailIndex]) {
                            tableData[parts[emailIndex].toLowerCase()] = parts[depIndex];
                            successCount++;
                        }
                    }

                    baseDataMap[tableName] = tableData;
                    saveToStorage();
                    updateUI();
                    
                    document.getElementById('tableName').value = '';
                    document.getElementById('baseFile').value = '';
                    alert('הטבלה "' + tableName + '" נשמרה בהצלחה!\nנטענו ' + successCount + ' משתמשים');
                } catch (error) {
                    alert('שגיאה בקריאת הקובץ: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        function updateSetupStatus() {
            var tables = Object.keys(baseDataMap);
            if (tables.length === 0) {
                document.getElementById('setupStatus').textContent = 'אין טבלאות עדיין';
                document.getElementById('tablesList').innerHTML = '';
            } else {
                document.getElementById('setupStatus').textContent = tables.length + ' טבלאות שמורות';
                var html = '';
                tables.forEach(function(table) {
                    var count = Object.keys(baseDataMap[table]).length;
                    html += '<div class="table-item"><div><strong>' + table + '</strong><br><span class="help-text">' + count + ' משתמשים</span></div><button class="table-item-delete" onclick="deleteTable(\'' + table.replace(/'/g, "\\'") + '\')">מחק</button></div>';
                });
                document.getElementById('tablesList').innerHTML = html;
            }
        }

        function deleteTable(tableName) {
            if (confirm('האם אתה בטוח שברצונך למחוק את הטבלה "' + tableName + '"?')) {
                delete baseDataMap[tableName];
                saveToStorage();
                updateUI();
            }
        }

        function updatePricingStatus() {
            var products = Object.keys(costingData);
            if (products.length === 0) {
                document.getElementById('pricingStatus').textContent = 'אין עלויות שהוגדרו עדיין';
                document.getElementById('costsList').innerHTML = '';
            } else {
                document.getElementById('pricingStatus').textContent = products.length + ' מוצרים שהוגדרו';
                var html = '';
                products.forEach(function(product) {
                    html += '<div class="table-item"><div><strong>' + product + '</strong><br><span class="help-text">₪' + costingData[product].toFixed(2) + ' לכל משתמש</span></div><button class="table-item-delete" onclick="deleteCost(\'' + product.replace(/'/g, "\\'") + '\')">מחק</button></div>';
                });
                document.getElementById('costsList').innerHTML = html;
            }
        }

        function deleteCost(product) {
            delete costingData[product];
            saveToStorage();
            updatePricingStatus();
        }

        function addCost() {
            var productName = document.getElementById('productName').value.trim();
            var productCost = parseFloat(document.getElementById('productCost').value);

            if (!productName) {
                alert('הזן שם מוצר');
                return;
            }

            if (isNaN(productCost) || productCost < 0) {
                alert('הזן עלות תקינה');
                return;
            }

            costingData[productName] = productCost;
            saveToStorage();
            document.getElementById('productName').value = '';
            document.getElementById('productCost').value = '';
            updatePricingStatus();
            alert(productName + ' נוסף בהצלחה!');
        }

        function analyzeFile() {
            if (Object.keys(baseDataMap).length === 0) {
                alert('אין טבלאות קבועות. העלה טבלה בתסמונת "הגדרה" תחילה');
                return;
            }

            if (Object.keys(costingData).length === 0) {
                alert('קודם כל הגדר עלויות בתסמונת "עלויות"');
                return;
            }

            var baseData = {};
            var tables = Object.keys(baseDataMap);
            tables.forEach(function(table) {
                var tableData = baseDataMap[table];
                Object.keys(tableData).forEach(function(email) {
                    if (!baseData[email]) {
                        baseData[email] = tableData[email];
                    }
                });
            });

            if (Object.keys(baseData).length === 0) {
                alert('הטבלאות הקבועות ריקות');
                return;
            }

            var fileInput = document.getElementById('analyzeFile');
            var file = fileInput.files[0];

            if (!file) {
                alert('בחר קובץ CSV');
                return;
            }

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var text = e.target.result;
                    var lines = text.trim().split('\n');

                    if (lines.length < 2) {
                        alert('הקובץ ריק או לא תקין');
                        return;
                    }

                    var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
                    var emailIndex = headers.findIndex(function(h) { return h === 'email'; });
                    var lastLoginIndex = headers.findIndex(function(h) { return h.includes('last') && h.includes('login'); });
                    
                    if (emailIndex === -1) {
                        alert('לא נמצאה עמודת email בקובץ');
                        return;
                    }

                    var productIndex = -1;
                    for (var j = 0; j < headers.length; j++) {
                        var header = headers[j];
                        var isProduct = Object.keys(costingData).some(function(product) { 
                            return header.toLowerCase() === product.toLowerCase(); 
                        });
                        if (isProduct) {
                            productIndex = j;
                            break;
                        }
                    }

                    if (productIndex === -1) {
                        alert('לא נמצאה עמודה עם שם המוצר שהגדרת');
                        return;
                    }

                    var departments = {};
                    var unmatchedRows = [];
                    var inactiveUsers = [];
                    var processedCount = 0;
                    var now = new Date();
                    var ninetyDaysAgo = new Date(now.getTime() - 90 * 24 * 60 * 60 * 1000);

                    for (var i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                        if (parts.length > emailIndex && parts[emailIndex]) {
                            var email = parts[emailIndex].toLowerCase();
                            var dept = baseData[email];

                            if (lastLoginIndex !== -1 && parts.length > lastLoginIndex && parts[lastLoginIndex]) {
                                var lastLoginDate = new Date(parts[lastLoginIndex]);
                                if (lastLoginDate < ninetyDaysAgo) {
                                    inactiveUsers.push({
                                        email: parts[emailIndex],
                                        dept: dept || 'לא מוגדר',
                                        lastLogin: parts[lastLoginIndex]
                                    });
                                }
                            }

                            var product = '';
                            var pIndex = -1;
                            for (var j = 0; j < headers.length; j++) {
                                var header = headers[j];
                                var isProduct = Object.keys(costingData).some(function(prod) { 
                                    return header.toLowerCase() === prod.toLowerCase(); 
                                });
                                if (isProduct) {
                                    pIndex = j;
                                    product = parts[j];
                                    break;
                                }
                            }

                            if (pIndex !== -1) {
                                var cost = costingData[product];
                                if (dept && cost !== undefined) {
                                    if (!departments[dept]) {
                                        departments[dept] = { users: 0, cost: 0 };
                                    }
                                    departments[dept].users += 1;
                                    departments[dept].cost += cost;
                                    processedCount++;
                                } else if (dept) {
                                    unmatchedRows.push({
                                        rowNum: i + 1,
                                        email: email,
                                        product: product,
                                        reason: 'מוצר לא מוגדר'
                                    });
                                }
                            } else if (dept) {
                                unmatchedRows.push({
                                    rowNum: i + 1,
                                    email: email,
                                    product: 'לא נמצא',
                                    reason: 'לא נמצאה עמודת מוצר'
                                });
                            }
                        }
                    }

                    if (processedCount === 0) {
                        alert('לא הצליח למצוא משתמשים תואמים או מוצרים תקינים');
                        return;
                    }

                    var sorted = Object.entries(departments).sort(function(a, b) { 
                        return b[1].cost - a[1].cost; 
                    });
                    var totalUsers = sorted.reduce(function(sum, item) { 
                        return sum + item[1].users; 
                    }, 0);
                    var totalMonthlyCost = sorted.reduce(function(sum, item) { 
                        return sum + item[1].cost; 
                    }, 0);

                    var html = '<div class="metrics"><div class="metric-card"><div class="metric-label">סה"כ משתמשים שהתאימו</div><div class="metric-value">' + totalUsers + '</div></div><div class="metric-card"><div class="metric-label">עלות חודשית כוללת</div><div class="metric-value">₪' + totalMonthlyCost.toFixed(2) + '</div></div></div>';

                    if (inactiveUsers.length > 0) {
                        html += '<div style="background: #ffe0b2; padding: 12px; border-radius: 4px; margin-bottom: 16px; font-size: 14px;">😴 ' + inactiveUsers.length + ' משתמשים לא התחברו ב-90 ימים האחרונים</div>';
                        var inactiveJson = JSON.stringify(inactiveUsers).replace(/\\/g, '\\\\').replace(/"/g, '&quot;');
                        html += '<button class="button" onclick="downloadInactiveUsers(' + "'" + inactiveJson + "'" + ')" style="margin-bottom: 16px;">📥 הורד משתמשים לא פעילים (CSV)</button>';
                    }

                    if (unmatchedRows.length > 0) {
                        html += '<div style="background: #ffeaa7; padding: 12px; border-radius: 4px; margin-bottom: 16px; font-size: 14px;">⚠️ ' + unmatchedRows.length + ' שורות לא תאמו</div>';
                        var unmatchedJson = JSON.stringify(unmatchedRows).replace(/\\/g, '\\\\').replace(/"/g, '&quot;');
                        html += '<button class="button" onclick="downloadUnmatched(' + "'" + unmatchedJson + "'" + ')" style="margin-bottom: 16px;">📥 הורד שורות שלא תאמו (CSV)</button>';
                    }

                    html += '<table><thead><tr><th>מחלקה</th><th style="text-align: center;">משתמשים</th><th style="text-align: center;">אחוז</th><th style="text-align: center;">עלות חודשית</th><th style="text-align: center;">הורדה</th></tr></thead><tbody>';

                    sorted.forEach(function(item) {
                        var dept = item[0];
                        var data = item[1];
                        var percentage = ((data.users / totalUsers) * 100).toFixed(1);
                        html += '<tr><td>' + dept + '</td><td style="text-align: center; font-weight: 600;">' + data.users + '</td><td style="text-align: center;">' + percentage + '%</td><td style="text-align: center; font-weight: 600;">₪' + data.cost.toFixed(2) + '</td><td style="text-align: center;"><button class="button" style="padding: 6px 12px; font-size: 12px;" onclick="downloadDeptUsers(' + "'" + dept.replace(/'/g, "\\'") + "'" + ', ' + emailIndex + ')">📥</button></td></tr>';
                    });

                    html += '</tbody></table>';

                    document.getElementById('results').innerHTML = html;
                    document.getElementById('analysisResults').style.display = 'block';
                    
                    lastAnalysisData = {
                        lines: lines,
                        emailIndex: emailIndex,
                        baseData: baseData,
                        departments: departments,
                        inactiveUsers: inactiveUsers,
                        unmatchedRows: unmatchedRows,
                        sorted: sorted,
                        totalUsers: totalUsers,
                        totalMonthlyCost: totalMonthlyCost,
                        html: html
                    };
                } catch (error) {
                    alert('שגיאה בניתוח הקובץ: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        function saveToHistory() {
            if (!lastAnalysisData) {
                alert('בצע ניתוח תחילה');
                return;
            }

            var saveName = document.getElementById('saveName').value.trim();
            if (!saveName) {
                alert('הזן שם לניתוח');
                return;
            }

            var now = new Date();
            var timestamp = now.toLocaleString('he-IL');
            var id = now.getTime();

            analysisHistory[id] = {
                name: saveName,
                timestamp: timestamp,
                data: lastAnalysisData
            };

            saveToStorage();
            updateUI();
            document.getElementById('saveName').value = '';
            alert('הניתוח נשמר בהצלחה!');
        }

        function updateHistoryStatus() {
            var historyIds = Object.keys(analysisHistory);
            if (historyIds.length === 0) {
                document.getElementById('historyStatus').textContent = 'אין ניתוחים שמורים עדיין';
                document.getElementById('historyList').innerHTML = '';
            } else {
                document.getElementById('historyStatus').textContent = historyIds.length + ' ניתוחים שמורים';
                var html = '';
                historyIds.sort(function(a, b) { return b - a; }).forEach(function(id) {
                    var item = analysisHistory[id];
                    html += '<div class="history-item"><div class="history-item-info"><div class="history-item-name">' + item.name + '</div><div class="history-item-date">' + item.timestamp + '</div></div><div class="history-item-buttons"><button class="button" style="padding: 6px 12px; font-size: 12px;" onclick="viewHistory(' + id + ')">👁️ הצג</button><button class="table-item-delete" onclick="deleteHistory(' + id + ')">מחק</button></div></div>';
                });
                document.getElementById('historyList').innerHTML = html;
            }
        }

        function viewHistory(id) {
            var item = analysisHistory[id];
            if (!item) {
                alert('הניתוח לא נמצא');
                return;
            }

            document.getElementById('results').innerHTML = item.data.html;
            lastAnalysisData = item.data;
            document.getElementById('analysisResults').style.display = 'none';
            
            var analyzeTab = document.querySelector('[onclick*="analyze"]');
            switchTab({ target: analyzeTab, preventDefault: function(){} }, 'analyze');
        }

        function deleteHistory(id) {
            if (confirm('האם אתה בטוח שברצונך למחוק את הניתוח?')) {
                delete analysisHistory[id];
                saveToStorage();
                updateUI();
            }
        }

        function downloadUnmatched(unmatchedJson) {
            try {
                var unmatchedRows = JSON.parse(unmatchedJson.replace(/&quot;/g, '"').replace(/\\\\/g, '\\'));
                
                if (!unmatchedRows || unmatchedRows.length === 0) {
                    alert('אין שורות לא תואמות להורדה');
                    return;
                }

                var csv = 'שורה,אימייל,מוצר,סיבה\n';
                unmatchedRows.forEach(function(row) {
                    csv += row.rowNum + ',"' + row.email + '","' + row.product + '","' + row.reason + '"\n';
                });

                var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', 'unmatched_' + new Date().getTime() + '.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                alert('שגיאה בהורדה: ' + e.message);
                console.error(e);
            }
        }

        function downloadInactiveUsers(inactiveJson) {
            try {
                var inactiveUsers = JSON.parse(inactiveJson.replace(/&quot;/g, '"').replace(/\\\\/g, '\\'));
                
                if (!inactiveUsers || inactiveUsers.length === 0) {
                    alert('אין משתמשים לא פעילים');
                    return;
                }

                var csv = 'אימייל,מחלקה,התחברות אחרונה\n';
                inactiveUsers.forEach(function(user) {
                    csv += '"' + user.email + '","' + user.dept + '","' + user.lastLogin + '"\n';
                });

                var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', 'inactive_users_' + new Date().getTime() + '.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                alert('שגיאה בהורדה: ' + e.message);
                console.error(e);
            }
        }

        function downloadDeptUsers(dept, emailIndex) {
            if (!lastAnalysisData) {
                alert('אין נתונים לניתוח. בצע ניתוח תחילה');
                return;
            }

            var lines = lastAnalysisData.lines;
            var baseData = lastAnalysisData.baseData;
            
            var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
            var lastLoginIndex = headers.findIndex(function(h) { return h.includes('last') && h.includes('login'); });
            
            var deptUsers = [];
            
            for (var i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                var parts = lines[i].split(',').map(function(p) { return p.trim(); });
                if (parts.length > emailIndex && parts[emailIndex]) {
                    var email = parts[emailIndex].toLowerCase();
                    var userDept = baseData[email];
                    
                    if (userDept === dept) {
                        var lastLogin = '';
                        if (lastLoginIndex !== -1 && parts.length > lastLoginIndex) {
                            lastLogin = parts[lastLoginIndex];
                        }
                        deptUsers.push({
                            email: parts[emailIndex],
                            dept: userDept,
                            lastLogin: lastLogin
                        });
                    }
                }
            }

            if (deptUsers.length === 0) {
                alert('אין משתמשים במחלקה זו');
                return;
            }

            var csv = 'אימייל,מחלקה,התחברות אחרונה\n';
            deptUsers.forEach(function(user) {
                csv += '"' + user.email + '","' + user.dept + '","' + user.lastLogin + '"\n';
            });

            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            var url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', dept + '_users_' + new Date().getTime() + '.csv');
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.addEventListener('load', function() {
            loadFromStorage();
        });
    </script>
